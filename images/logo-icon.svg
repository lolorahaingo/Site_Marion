<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="wg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a96e"/>
      <stop offset="100%" style="stop-color:#ddc99a"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a96e"/>
      <stop offset="100%" style="stop-color:#8b5e3c"/>
    </linearGradient>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c59"/>
      <stop offset="100%" style="stop-color:#6b9e7a"/>
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="50" cy="50" r="48" fill="#faf8f2" stroke="#4a7c59" stroke-width="2.5"/>

  <!-- Bread shape -->
  <ellipse cx="50" cy="55" rx="28" ry="20" fill="url(#bg)"/>
  <!-- Scoring -->
  <path d="M34 49 Q50 45 64 49" stroke="#a07840" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M32 55 Q50 51 68 55" stroke="#a07840" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M34 61 Q50 57 64 61" stroke="#a07840" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Left wheat -->
  <g transform="translate(18, 12) rotate(-20, 15, 30)">
    <line x1="15" y1="8" x2="15" y2="40" stroke="#6b9e7a" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="10" cy="11" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(-30, 10, 11)"/>
    <ellipse cx="10" cy="19" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(-30, 10, 19)"/>
    <ellipse cx="10" cy="27" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(-30, 10, 27)"/>
    <ellipse cx="20" cy="11" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(30, 20, 11)"/>
    <ellipse cx="20" cy="19" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(30, 20, 19)"/>
    <ellipse cx="20" cy="27" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(30, 20, 27)"/>
    <ellipse cx="15" cy="6" rx="2.5" ry="4" fill="url(#wg)"/>
  </g>

  <!-- Right wheat -->
  <g transform="translate(55, 12) rotate(20, 15, 30)">
    <line x1="15" y1="8" x2="15" y2="40" stroke="#6b9e7a" stroke-width="1.5" stroke-linecap="round"/>
    <ellipse cx="10" cy="11" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(-30, 10, 11)"/>
    <ellipse cx="10" cy="19" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(-30, 10, 19)"/>
    <ellipse cx="10" cy="27" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(-30, 10, 27)"/>
    <ellipse cx="20" cy="11" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(30, 20, 11)"/>
    <ellipse cx="20" cy="19" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(30, 20, 19)"/>
    <ellipse cx="20" cy="27" rx="4" ry="2.5" fill="url(#wg)" transform="rotate(30, 20, 27)"/>
    <ellipse cx="15" cy="6" rx="2.5" ry="4" fill="url(#wg)"/>
  </g>

  <!-- Leaves at bottom -->
  <path d="M50 76 Q44 70 47 64 Q50 70 50 76 Z" fill="url(#lg)" opacity="0.8"/>
  <path d="M50 76 Q56 70 53 64 Q50 70 50 76 Z" fill="url(#lg)" opacity="0.6"/>
</svg>
